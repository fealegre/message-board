{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">Iniciar sesión</h2>
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
            {{ form.password }}
          </div>
          {% if form.non_field_errors %}
            <div class="alert alert-danger py-2">{{ form.non_field_errors.0 }}</div>
          {% endif %}
          <button type="submit" class="btn btn-indigo w-100">Iniciar sesión</button>
        </form>
        <p class="text-center mt-3 mb-0">
          ¿No tienes una cuenta? <a href="{% url 'signup' %}" class="text-indigo">Registrarse</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
