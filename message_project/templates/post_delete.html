{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body text-center">
        <h2 class="card-title text-danger mb-3">Eliminar post</h2>
        <p class="card-text">¿Estás seguro de que quieres eliminar</p>
        <p class="fw-bold fs-5">&ldquo;{{ post.title }}&rdquo;</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Confirmar eliminación</button>
          <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
