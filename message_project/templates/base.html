{% load static %}
<!doctype html>
<html lang="es" data-bs-theme="light" data-theme="light">
  <head>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-bs-theme', theme);
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Django</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{% static 'css/base.css' %}?v=2" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-indigo">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">Blog Django</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <span class="nav-link text-light">Hola {{ user.username }}!</span>
            </li>
            <li class="nav-item">
              <a
                class="btn btn-outline-light btn-sm"
                href="{% url 'post_new' %}"
                >+ Nuevo Post</a
              >
            </li>
            <li class="nav-item">
              <form action="{% url 'logout' %}" method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">
                  Cerrar sesión
                </button>
              </form>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}">Iniciar sesión</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'signup' %}">Registrarse</a>
            </li>
            {% endif %}
            <li class="nav-item">
              <button id="theme-toggle" aria-label="Cambiar tema"></button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-4">{% block content %}{% endblock %}</main>

    <footer class="container mt-5 mb-3 text-center text-muted small">
      <p class="mb-0">&copy; {% now "Y" %} Blog Django. Hecho con Django.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (function() {
        var html = document.documentElement;
        var btn = document.getElementById('theme-toggle');

        function setIcon(theme) {
          btn.textContent = theme === 'dark' ? '\u2600\ufe0f' : '\u{1F319}';
        }

        setIcon(html.getAttribute('data-theme') || 'light');

        btn.addEventListener('click', function() {
          var current = html.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          html.setAttribute('data-bs-theme', next);
          localStorage.setItem('theme', next);
          setIcon(next);
        });
      })();
    </script>
  </body>
</html>
